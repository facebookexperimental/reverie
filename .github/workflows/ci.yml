name: Rust

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C link-arg=-llzma

jobs:
  regular:
    name: Regular tests (GitHub-hosted)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Dependencies
      run: sudo apt-get install -y libunwind-dev liblzma-dev
    - name: Rust toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: clippy, rustfmt
    - name: Build
      run: cargo build --workspace --all-features
    - name: Test regular workspace cases
      run: >-
        cargo test --workspace --all-features --
        --test-threads=1
        --skip container::tests::bind_to_low_port
        --skip container::tests::pin_affinity_to_all_cores
        --skip tests::domainname
        --skip tests::hostname
        --skip tests::local_networking_loopback_flags
        --skip tests::local_networking_ping
        --skip tests::local_networking_there_can_be_only_one
        --skip tests::mount_and_move_tmpfs
        --skip tests::mount_bind
        --skip tests::mount_devpts_basic
        --skip tests::mount_devpts_isolated
        --skip tests::mount_proc
        --skip tests::mount_tmpfs
        --skip tests::pid_namespace
        --skip tests::port_isolation
        --skip tests::seccomp_notify
        --skip tests::uid_namespace
    - name: Documentation tests
      run: cargo test --workspace --doc
    - name: Clippy
      run: cargo clippy --workspace --all-targets --all-features
    - name: Format
      run: cargo fmt --all -- --check

  hardware:
    name: Host-dependent tests (self-hosted)
    if: >-
      ${{
        vars.REVERIE_SELF_HOSTED == 'true' &&
        (
          github.event_name == 'push' ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.actor == 'rrnewton'
          ) ||
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.user.login == 'rrnewton'
          )
        )
      }}
    runs-on: [self-hosted, Linux, X64, reverie]

    steps:
    - uses: actions/checkout@v4
    - name: Dependencies
      run: |
        if command -v apt-get >/dev/null; then
          sudo apt-get install -y libunwind-dev liblzma-dev
        else
          sudo dnf install -y libunwind-devel xz-devel
        fi
    - name: Rust toolchain
      uses: dtolnay/rust-toolchain@nightly
    - name: Host-dependent workspace tests
      run: cargo test --workspace --all-features -- --test-threads=1
