# @generated by autocargo from //hermetic_infra/reverie:safeptrace

[package]
name = "safeptrace"
version = "0.1.0"
authors = ["Meta Platforms"]
edition = "2024"
repository = "https://github.com/facebookexperimental/reverie"
license = "BSD-2-Clause"

# `sanitized` is a Meta-internal cfg (set for sanitizer builds to skip
# fork-based tests); declare it as a known cfg name so the open-source build
# does not warn under `unexpected_cfgs`. Reflect this in the autocargo source.
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(sanitized)'] }

[dependencies]
bitflags = { version = "2.13.1", features = ["serde", "std"], default-features = false }
futures = { version = "0.3.31", features = ["async-await", "compat"] }
libc = "0.2.186"
nix = { version = "0.30.1", features = ["dir", "event", "hostname", "inotify", "ioctl", "mman", "mount", "net", "poll", "ptrace", "reboot", "resource", "sched", "signal", "term", "time", "user", "zerocopy"] }
parking_lot = { version = "0.12.1", features = ["arc_lock", "send_guard"] }
reverie-memory = { version = "0.1.0", path = "../reverie-memory", optional = true }
reverie-process = { version = "0.1.0", path = "../reverie-process" }
syscalls = { version = "0.6.18", features = ["serde"] }
thiserror = "2.0.18"

[dev-dependencies]
quickcheck = "1.1"
quickcheck_macros = "1.2.0"
tokio = { version = "1.52.4", features = ["full", "test-util", "tracing"] }

[features]
default = []
memory = ["reverie-memory"]
notifier = []
